<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom - Juego de Mesa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="/css/custom.css">
  </head>
  <body class="bg-light">
    <header class="container py-3">
      <h1 class="h3 mb-0">Atom</h1>
    </header>

    <main class="container pb-4">
      <section class="card shadow-sm">
        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
          <p class="mb-0">Estado de conexión</p>
          <span
            id="connection-status"
            class="badge text-bg-secondary"
            role="status"
            aria-live="polite"
            aria-label="Estado de conexión"
          >Conectando...</span>
        </div>
      </section>

      <section class="mt-4" aria-label="Acciones rápidas">
        <button id="btn-status" type="button" class="btn btn-primary" aria-label="Solicitar estado">
          Solicitar estado
        </button>
      </section>

      <section id="game-container" class="mt-4" aria-label="Área de juego">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-2 mb-3">
              <div class="d-flex gap-2">
                <span id="player-1-indicator" class="badge text-bg-primary" aria-label="Indicador jugador 1">Jugador 1</span>
                <span id="player-2-indicator" class="badge text-bg-warning" aria-label="Indicador jugador 2">Jugador 2</span>
              </div>
              <div class="d-flex flex-column align-items-start align-items-lg-end">
                <p id="turn-number-indicator" class="mb-0 small text-muted" role="status" aria-live="polite">Turno #1</p>
                <p id="turn-indicator" class="mb-0" role="status" aria-live="polite">Turno de Jugador 1</p>
              </div>
            </div>

            <div class="d-flex gap-2 mb-3">
              <label class="visually-hidden" for="board-size">Tamaño del tablero</label>
              <select id="board-size" class="form-select w-auto" aria-label="Tamaño del tablero">
                <option value="4">4x4</option>
                <option value="6" selected>6x6</option>
                <option value="8">8x8</option>
                <option value="10">10x10</option>
              </select>
              <div class="btn-group" role="group" aria-label="Modo de juego">
                <input type="radio" class="btn-check" name="game-mode" id="game-mode-human" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="game-mode-human">Vs Jugador</label>
                <input type="radio" class="btn-check" name="game-mode" id="game-mode-machine" autocomplete="off">
                <label class="btn btn-outline-primary" for="game-mode-machine">Vs Máquina</label>
              </div>
              <button id="btn-new-game" type="button" class="btn btn-success" aria-label="Iniciar nueva partida">Nueva Partida</button>
              <button id="btn-restart-game" type="button" class="btn btn-outline-secondary" aria-label="Reiniciar partida">Reiniciar</button>
            </div>

            <div class="d-flex flex-column flex-md-row align-items-md-center gap-2 mb-3">
              <small class="text-muted">ID de partida: <span id="game-id-value">-</span></small>
              <label class="visually-hidden" for="join-game-id">ID para unirse</label>
              <input id="join-game-id" class="form-control" type="text" placeholder="ID de partida" aria-label="ID de partida para unirse">
              <button id="btn-join-game" type="button" class="btn btn-outline-primary" aria-label="Unirse a partida">Unirse</button>
            </div>

            <p id="game-notice" class="mb-3" role="status" aria-live="assertive">Esperando inicio de partida</p>

            <div id="game-board" class="game-board" role="region" aria-label="Tablero del juego"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="container py-3">
      <small class="text-muted">Juego de mesa en línea ambientado en el mundo atómico.</small>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
